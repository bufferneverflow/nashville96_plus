<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Perfect DOS VGA 437 covers only the CP437 repertoire (~256 glyphs).
       Route everything it lacks through BigBlueTermPlus first so missing
       glyphs stay pixel-styled, then Noto Sans Thai (Thai script + Baht
       sign, which no pixel font covers), then DejaVu Sans for the rest. -->
  <match target="pattern">
    <test name="family">
      <string>Perfect DOS VGA 437</string>
    </test>
    <edit name="family" mode="append" binding="weak">
      <string>BigBlueTermPlus Nerd Font</string>
      <string>Noto Sans Thai</string>
      <string>DejaVu Sans</string>
    </edit>
  </match>
</fontconfig>
